version: '3'

env:
  GOEXPERIMENT: 
    - norandomizedheapbase64
    - simd
vars:
  LONG_COMMIT_HASH:
    sh: git rev-parse HEAD
  SHORT_COMMIT_HASH:
    sh: git rev-parse --short HEAD
  VERSION:
    1.0.1

tasks:
  build:
    cmds:
      - go build -ldflags '-X "main.version={{.VERSION}}" -X "main.longCommitHash={{.LONG_COMMIT_HASH}}" -X "main.shortCommitHash={{.SHORT_COMMIT_HASH}}"' -o ./bin/new-json2.exe .